rules:
  - id: DQ-VAL-001
    name: "Accident date in valid range"
    dimension: validity
    severity: critical
    dataset: accidents
    column: accident_date
    check: between
    parameters:
      min: "2020-01-01"
      max: "{{ today }}"
  - id: DQ-VAL-002
    name: "Severity code is a known value"
    dimension: validity
    severity: warning
    dataset: accidents
    column: severity_code
    check: regex
    parameters:
      pattern: "^(FATAL|SERIOUS|MINOR|PROPERTY)$"
